name: Assign Reviewer

on:
  pull_request:
    # opened    — initial submission
    # synchronize — student pushed a fix after a validation error
    types: [opened, synchronize]
    # Only PRs from branches matching {login}/hw* pattern
    branches: [main]

jobs:
  assign:
    runs-on: ubuntu-latest
    # Only run for branches like alice/hw2, not main or other service branches
    if: contains(github.head_ref, '/hw')
    
    concurrency:
      group: state-write
      cancel-in-progress: false
      
    steps:
      - name: Checkout coordinator repo
        uses: actions/checkout@v4
        with:
          # Always checkout main: state/hw*.json lives there and we push back to it.
          # Without ref: main the pull_request trigger gives a detached HEAD
          # (merge commit), and git push fails with "not currently on a branch".
          ref: main
          token: ${{ secrets.GH_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install requests

      - name: Extract author and HW name from branch
        id: meta
        run: |
          # Branch format: alice/hw2
          BRANCH="${{ github.head_ref }}"
          AUTHOR=$(echo "$BRANCH" | cut -d'/' -f1)
          HW=$(echo "$BRANCH" | cut -d'/' -f2)
          echo "author=$AUTHOR" >> $GITHUB_OUTPUT
          echo "hw=$HW" >> $GITHUB_OUTPUT

      - name: Validate author identity
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          ACTUAL="${{ github.actor }}"          # реальный логин GitHub
          BRANCH_AUTHOR="${{ steps.meta.outputs.author }}"  # из имени ветки
          HW="${{ steps.meta.outputs.hw }}"
          PR="${{ github.event.pull_request.number }}"

          # 1. Soft check: PR title format (informational only, does not block).
          # Runs first so the hint is always sent even if hard checks below fail.
          # Only on 'opened' — don't spam on every push to the same PR.
          if [ "${{ github.event.action }}" = "opened" ]; then
            EXPECTED_TITLE="${HW}: ${ACTUAL}"
            ACTUAL_TITLE=$(gh pr view "$PR" --json title --jq '.title' \
              --repo ${{ github.repository }})
            if [ "$ACTUAL_TITLE" != "$EXPECTED_TITLE" ]; then
              gh pr comment "$PR" \
                --body "💬 @${ACTUAL}, рекомендуемый заголовок PR: \`${EXPECTED_TITLE}\`. Назначение рецензента при этом не блокируется — можете исправить заголовок в любой момент." \
                --repo ${{ github.repository }}
            fi
          fi

          # 2. Имя ветки должно начинаться с реального логина
          if [ "$ACTUAL" != "$BRANCH_AUTHOR" ]; then
            gh pr comment "$PR" \
              --body "❌ @${ACTUAL}, имя ветки содержит \`${BRANCH_AUTHOR}\`, но PR открыт от \`${ACTUAL}\`. Переименуйте ветку: \`${ACTUAL}/hw*\`." \
              --repo ${{ github.repository }}
            exit 1
          fi

          # 3. HW-часть ветки должна строго соответствовать формату hw<число>
          # Это предотвращает обход re-submission check через ветки вида hw2-v2, hw2-final и т.п.
          if ! echo "$HW" | grep -qE '^hw[0-9]+$'; then
            gh pr comment "$PR" \
              --body "❌ @${ACTUAL}, неверный формат имени ветки. Ожидается \`${ACTUAL}/hw<номер>\` (например \`${ACTUAL}/hw2\`), получено \`${ACTUAL}/${HW}\`." \
              --repo ${{ github.repository }}
            exit 1
          fi

          # 4. Файл должен лежать в reviews/{реальный_логин}/
          FILES=$(gh pr view "$PR" \
            --json files --jq '.files[].path' \
            --repo ${{ github.repository }})

          if ! echo "$FILES" | grep -q "^reviews/${ACTUAL}/"; then
            gh pr comment "$PR" \
              --body "❌ @${ACTUAL}, файл должен находиться в \`reviews/${ACTUAL}/\`. Сейчас изменены: \`$(echo $FILES | tr ' ' ', ')\`. Исправьте путь и обновите PR." \
              --repo ${{ github.repository }}
            exit 1
          fi

      - name: Run assign.py
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          ORG_NAME: ${{ secrets.ORG_NAME }}
          HUB_REPO: ${{ github.repository }}
        run: |
          python scripts/assign.py \
            --hw "${{ steps.meta.outputs.hw }}" \
            --author "${{ steps.meta.outputs.author }}" \
            --pr "${{ github.event.pull_request.number }}" \
            --pr-url "${{ github.event.pull_request.html_url }}"

      - name: Commit updated state
        env:
          BRANCH: ${{ github.head_ref }}
        run: |
          git config user.name "peer-review-bot"
          git config user.email "bot@noreply"
          git add state/
          # Don't fail if nothing changed
          git diff --cached --quiet || git commit -m "state: assign reviewer for ${BRANCH}"
          git push
